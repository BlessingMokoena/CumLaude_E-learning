<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | CumLaude</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: #1b3768; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card h4 { margin: 0; color: #d4af37; }
    </style>
</head>
<body style="display: block; padding: 40px; background: #f4f7f6;">
    <div style="max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 style="color: #1b3768;">Administrative Control Center</h1>
        <hr border="0" height="1px" background="#ccc">
        
        <div class="admin-grid">
            <div class="stat-card"><h4>Total Students</h4><p>1,240</p></div>
            <div class="stat-card"><h4>Staff Members</h4><p>45</p></div>
            <div class="stat-card"><h4>Pending Apps</h4><p>12</p></div>
        </div>

        <h3 style="margin-top: 40px;">User Management</h3>
        <button class="ticket-button" style="width: 200px;">+ Add New Student</button>
        <button class="ticket-button" style="width: 200px; background: #333;">+ Add Staff Member</button>
        
        <a href="homepage.html" style="display: block; margin-top: 20px; color: #1b3768;">Logout</a>
    </div>
</body>
</html>
